name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  cargo-publish:
    name: Publish crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish Rust crate
        shell: bash
        run: |
          set +e
          output="$(cargo publish --token "$CARGO_REGISTRY_TOKEN" 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if grep -Eiq 'already (uploaded|exists|published)' <<<"$output"; then
            exit 0
          fi
          exit "$status"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  python-wheels:
    name: Build Python wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path python/Cargo.toml --out dist
          manylinux: auto
          sccache: true

      - name: Test wheel
        shell: bash
        env:
          ITU_RS_DATA_DIR: ${{ github.workspace }}/data
        run: |
          wheel="$(find dist -name '*.whl' | head -n 1)"
          uv run --python 3.9 --with pytest --with "$wheel" python -m pytest python/tests

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  python-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: uv run --project python --group dev maturin sdist --manifest-path python/Cargo.toml --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  pypi-publish:
    name: Publish PyPI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    environment:
      name: pypi
    needs:
      - cargo-publish
      - python-wheels
      - python-sdist
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
